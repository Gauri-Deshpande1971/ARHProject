<div class="d-flex align-items-center justify-content-center min-vh-100 bg-light">
  <div class="card p-4 shadow" style="width: 100%; max-width: 400px;">
    <form [formGroup]="loginForm">
      <div class="text-center mb-4">
        <img class="mb-3" src="/assets/img/logo.png" alt="Logo" width="150">
        <h1 class="text-info" *ngIf="!newPasswordReq">LOGIN</h1>
        <p class="small text-muted">Enter your email and password to sign in</p>

        <h3 class="text-info" *ngIf="newPasswordReq">NEW PASSWORD</h3>
        <p class="small text-muted" *ngIf="newPasswordReq">Set New Password as required</p>
      </div>

      <!-- Email -->
      <div class="form-group mb-3">
        <label for="email">Login Id</label>
        <input type="text" class="form-control" id="email" formControlName="Email" autocomplete="off" />
      </div>

      <!-- Password -->
      <div class="form-group mb-3">
        <label for="password">Password</label>
        <input type="password" class="form-control" id="password" formControlName="Password" autocomplete="off" />
      </div>

      <!-- Forgot Password -->
      <div class="text-end mb-3">
        <a (click)="showRecoverForm()" href="javascript:void(0)" class="small text-primary">
          <i class="fa fa-lock me-1"></i> Forgot password?
        </a>
      </div>

      <!-- Submit Button -->
      <button type="button" class="btn btn-info w-100 mb-3" (click)="checklogin()">
        Sign In
      </button>

      <!-- Optional Reset CAPTCHA -->
      <div class="text-center mb-3" *ngIf="resetcaptcha">
        <img [src]="resetCaptchaImg" width="200px" *ngIf="resetCaptchaImg">
        <p class="small text-muted">Enter the code shown above</p>
      </div>

      <!-- New Password Fields -->
      <div *ngIf="otpform || newPasswordReq">
        <div class="form-group mb-3">
          <label for="newpassword">New Password</label>
          <input type="password" class="form-control" id="newpassword" formControlName="newpassword" />
        </div>
        <div class="form-group mb-3">
          <label for="confirmpassword">Confirm Password</label>
          <input type="password" class="form-control" id="confirmpassword" formControlName="confirmpassword" />
        </div>
      </div>

      <!-- Submit New Password / OTP -->
      <div *ngIf="otpform || newPasswordReq" class="d-grid">
        <button *ngIf="otpform" class="btn btn-success mb-2" (click)="SubmitOTP()">Submit OTP</button>
        <button *ngIf="newPasswordReq" class="btn btn-success" (click)="SubmitNewPassword()">Submit Password</button>
      </div>
    </form>
  </div>
</div>
